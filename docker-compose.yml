version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: fishcast-postgres
    environment:
      POSTGRES_USER: fishcast
      POSTGRES_PASSWORD: fishcast
      POSTGRES_DB: fishcast
    ports:
      - "5433:5432"
    volumes:
      - fishcast_pgdata:/var/lib/postgresql/data

volumes:
  fishcast_pgdata: